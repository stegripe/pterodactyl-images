name: Build and Push PgBouncer to OCI Image Registry

on:
  push:
    branches:
      - "**"
    paths:
      - "pgbouncer/Dockerfile"
      - "pgbouncer/entrypoint.sh"
  pull_request:
    branches:
      - "**"
    paths:
      - "pgbouncer/Dockerfile"
      - "pgbouncer/entrypoint.sh"
  workflow_dispatch:

jobs:
  push-pgbouncer:
    name: PgBouncer

    uses: ./.github/workflows/build.yml
    with:
      rootdir: pgbouncer
      workdir: pgbouncer
      image-name: pgbouncer
    secrets: inherit
