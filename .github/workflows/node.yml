name: Build and Push Node.js to OCI Image Registry

on:
  push:
    branches:
      - "**"
    paths:
      - "node/**/**/Dockerfile"
      - "node/entrypoint.sh"
  pull_request:
    branches:
      - "**"
    paths:
      - "node/**/**/Dockerfile"
      - "node/entrypoint.sh"
  workflow_dispatch:

jobs:
  node-alpine:
    name: Node.js ${{ matrix.version }} Alpine

    strategy:
      fail-fast: false
      matrix:
        version:
          - 22
          - 24

    uses: ./.github/workflows/build.yml
    with:
      rootdir: node
      workdir: node/${{ matrix.version }}/alpine
      image-name: node
    secrets: inherit

  node-debian:
    name: Node.js ${{ matrix.version }} Debian
    needs: node-alpine

    strategy:
      fail-fast: false
      matrix:
        version:
          - 22
          - 24

    uses: ./.github/workflows/build.yml
    with:
      rootdir: node
      workdir: node/${{ matrix.version }}/debian
      image-name: node
    secrets: inherit

  node-puppeteer:
    name: Node.js ${{ matrix.version }} Puppeteer
    needs: node-debian

    strategy:
      fail-fast: false
      matrix:
        version:
          - 22
          - 24

    uses: ./.github/workflows/build.yml
    with:
      rootdir: node
      workdir: node/${{ matrix.version }}/puppeteer
      image-name: node-puppeteer
    secrets: inherit
